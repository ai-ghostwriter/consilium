name: smoke-test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run offline smoke test (stubbed CLIs, no tokens)
        run: bash scripts/test_smoke.sh
